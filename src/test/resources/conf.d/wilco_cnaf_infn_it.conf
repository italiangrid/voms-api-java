[ wilco_cnaf_infn_it ]

default_bits           = 2048
default_keyfile        = ${ENV::CA_NAME}/certs/wilco_cnaf_infn_it.key.pem
distinguished_name     = wilco_cnaf_infn_it_dn
prompt                 = no
output_password        = pass
default_md             = sha512
x509_extensions        = wilco_cnaf_infn_it_extensions

[ wilco_cnaf_infn_it_dn ]

C                      = IT
O                      = IGI
CN                     = wilco.cnaf.infn.it

[ wilco_cnaf_infn_it_extensions ]

basicConstraints       = critical,CA:FALSE
subjectKeyIdentifier   = hash
keyUsage               = critical, digitalSignature
extendedKeyUsage       = serverAuth, clientAuth
authorityKeyIdentifier = keyid, issuer
subjectAltName         = DNS:wilco.cnaf.infn.it
